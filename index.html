<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지도 퀴즈</title>
    <link rel="stylesheet" href="styles.css?v=37">
</head>
<body class="main-landing">
    <div class="container">
        <header>
            <button id="theme-toggle" class="theme-toggle" title="테마 전환">
                <span class="theme-icon-light">☀️</span>
                <span class="theme-icon-dark">🌙</span>
            </button>
            <h1>지도 퀴즈</h1>
        </header>

        <main>
            <div id="main-landing" class="screen active">
                <h2>어떤 지도를 학습할까요?</h2>
                <p>학습하고 싶은 지역을 선택하세요</p>

                <div class="main-menu-buttons">
                    <a href="korea/" class="main-menu-btn korea-btn">
                        <img src="https://flagcdn.com/w160/kr.png" alt="대한민국" class="menu-flag">
                        <div class="menu-text">
                            <span class="menu-title">대한민국 지도</span>
                            <span class="menu-desc">17개 시도, 250개 시군구의 위치를 학습하세요</span>
                        </div>
                    </a>
                    <a href="world/" class="main-menu-btn world-btn">
                        <img src="https://em-content.zobj.net/source/twitter/408/globe-showing-americas_1f30e.png" alt="지구" class="menu-globe">
                        <div class="menu-text">
                            <span class="menu-title">세계 지도</span>
                            <span class="menu-desc">대륙별 국가의 위치를 학습하세요</span>
                        </div>
                    </a>
                    <a href="subway/" class="main-menu-btn subway-btn">
                        <span class="menu-subway-icon">🚇</span>
                        <div class="menu-text">
                            <span class="menu-title">수도권 지하철 <span class="dev-badge">개발중</span></span>
                            <span class="menu-desc">24개 노선, 750개 역의 위치를 학습하세요</span>
                        </div>
                    </a>
                    <a href="mountains/" class="main-menu-btn mountain-btn">
                        <span class="menu-mountain-icon">🏔️</span>
                        <div class="menu-text">
                            <span class="menu-title">100대 명산 <span class="dev-badge">개발중</span></span>
                            <span class="menu-desc">전국 100대 명산의 위치를 학습하세요</span>
                        </div>
                    </a>
                </div>
            </div>
        </main>

        <footer class="main-footer">
            <p class="copyright">© 2026 infinite monkey. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // 테마 토글 기능
        const themeToggle = document.getElementById('theme-toggle');

        // 저장된 테마 불러오기 (기본: 라이트)
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        // 기본값은 CSS에서 라이트 모드

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            if (newTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', newTheme);
            }
            localStorage.setItem('theme', newTheme);
        });

    </script>
</body>
</html>
